<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Tumor Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js" defer></script>
  <script src="/static/board.js" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">⚭</span>
      <span class="brand-name">AI Tumor Board</span>
      <span class="brand-sub">v0.5 · demo</span>
    </div>
    <nav class="topbar-nav">
      <a href="/" class="active">Board</a>
      <a href="/about">About</a>
      <a href="/privacy">Privacy</a>
      <a href="https://github.com/Roupen92/AI-tumor-board" target="_blank" rel="noopener">GitHub</a>
    </nav>
    <div class="topbar-right"></div>
  </header>

  <main class="page">

    <!-- ───── HERO INPUT ───── -->
    <section class="hero">
      <label for="case" class="hero-label">
        Paste a clinical case
        <span class="phi-warn">·&nbsp;avoid
          <a href="https://www.hhs.gov/hipaa/for-professionals/privacy/special-topics/de-identification/index.html"
             target="_blank" rel="noopener"
             title="Protected Health Information under HIPAA. Click for the HHS de-identification guidance.">PHI</a>
        </span>
      </label>
      <textarea id="case" rows="7" aria-describedby="case-error" placeholder="e.g. 67F never-smoker. cT4N2M1 NSCLC, EGFR L858R, TP53 co-mut, L3 vertebral lesion. ECOG 1. What is the recommended management?"></textarea>
      <small id="case-error" class="case-error" role="alert" hidden></small>
      <div class="hero-options">
        <input id="patient-location" type="text" class="loc-input"
               placeholder="Patient location for trial matching (optional, e.g. Boston, MA)"
               maxlength="200" aria-label="Patient location for clinical trial matching" />
        <label class="trial-toggle"
               title="Adds a Clinical Trial Matcher that screens recruiting trials against this patient">
          <input id="enable-trials" type="checkbox" checked />
          <span>Match clinical trials</span>
        </label>
      </div>
      <div class="hero-row">
        <button id="start" type="button" class="btn primary">Convene board</button>
        <button id="cancel" type="button" class="btn ghost" disabled>Cancel</button>
        <button id="new-chat" type="button" class="btn ghost">New chat</button>
        <span id="status-line" class="status-line"></span>
      </div>
    </section>

    <!-- ───── ROUND TABLE (visible during run + after) ───── -->
    <section class="section section-table" id="table-section" hidden>
      <div class="section-head">
        <h2>Round Table · MDT</h2>
        <span class="section-meta" id="table-meta">6 agents · 2 conditional</span>
      </div>
      <div class="table-card">
        <div class="table-stage" id="table-stage"
             role="img"
             aria-label="Tumor board round table showing 6 specialist agents arranged in a circle"><!-- SVG injected by board.js --></div>
      </div>
    </section>

    <!-- ───── FINAL RECOMMENDATION ───── -->
    <section class="section section-final" id="final-section" hidden>
      <div class="section-head">
        <h2>Final recommendation</h2>
        <span class="section-meta" id="final-meta"></span>
      </div>
      <div class="final-card" id="final-card"></div>
    </section>

    <!-- ───── EVIDENCE ───── -->
    <section class="section section-evidence" id="evidence-section" hidden>
      <div class="section-head">
        <h2>Evidence <span class="muted" id="evidence-count"></span></h2>
        <span class="section-meta">live · click filter to narrow</span>
      </div>
      <div class="evidence-filters" id="evidence-filters"></div>
      <div class="evidence-grid" id="evidence-grid"></div>
    </section>

    <!-- ───── CLINICAL TRIALS (bottom) ───── -->
    <section class="section section-trials" id="trials-section" hidden>
      <div class="section-head">
        <h2>Clinical trials <span class="muted" id="trials-count"></span></h2>
        <span class="section-meta">matched &amp; eligibility-screened against this patient</span>
      </div>
      <div class="trials-grid" id="trials-grid"></div>
      <div class="trials-analysis" id="trials-analysis" hidden></div>
    </section>

  </main>
</body>
</html>
