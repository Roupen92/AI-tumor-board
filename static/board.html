<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Tumor Board</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
  <script src="/static/board.js" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <h1>AI Tumor Board</h1>
    </div>
    <nav class="topbar-nav">
      <a href="/about">About</a>
      <a href="/privacy">Privacy</a>
      <a href="https://github.com/Roupen92/AI-tumor-board" target="_blank" rel="noopener">GitHub</a>
      <span class="disclaimer">Research / educational demo only. Not for clinical use.</span>
    </nav>
  </header>

  <section class="composer">
    <label for="case">
      Paste a clinical case &nbsp;·&nbsp;
      <span class="phi-warn">
        avoid
        <a href="https://www.hhs.gov/hipaa/for-professionals/privacy/special-topics/de-identification/index.html"
           target="_blank" rel="noopener"
           title="Protected Health Information under HIPAA — the 18 identifiers (names, dates, MRN, etc.) that must be removed before sharing a case. Opens HHS.gov.">PHI</a>
      </span>
    </label>
    <textarea id="case" rows="5" placeholder="e.g. 62-year-old man with cT3N1M0 distal esophageal adenocarcinoma, HER2-negative, ECOG 1, CKD stage 3 (eGFR 45), on warfarin. Otherwise a surgical candidate. What is the recommended management?"></textarea>
    <div class="composer-row">
      <button id="start" type="button" class="primary">Convene board</button>
      <button id="cancel" type="button" class="ghost" disabled>Cancel</button>
      <button id="new-chat" type="button" class="ghost">New chat</button>
      <span id="status-line" class="status-line"></span>
    </div>
  </section>

  <section class="panels" id="panels"></section>

  <section class="transcript-section">
    <h2>Discussion transcript</h2>
    <ol id="transcript" class="transcript"></ol>
  </section>

  <section class="final-section">
    <h2>Final recommendation</h2>
    <div id="final" class="final-card empty">No recommendation yet.</div>
  </section>

  <section class="references-section">
    <h2>All evidence retrieved <span id="refs-count" class="refs-count"></span></h2>
    <p id="refs-empty" class="refs-empty">No evidence yet.</p>
    <ol id="refs-list" class="refs-list" hidden></ol>
  </section>

  <template id="panel-template">
    <article class="panel">
      <header>
        <span class="panel-color"></span>
        <h3 class="panel-name"></h3>
        <span class="status-pill" data-state="idle">idle</span>
      </header>
      <div class="draft markdown"></div>
      <div class="evidence-refs"></div>
    </article>
  </template>
</body>
</html>
